<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Trading — Simulator v7</title>
<style>
:root {
  --bg:        #0f1117;
  --bg2:       #1a1d27;
  --bg3:       #22263a;
  --border:    #2e3349;
  --border2:   #3a4060;
  --text:      #e2e8f0;
  --text2:     #94a3b8;
  --text3:     #64748b;
  --green:     #22c55e;
  --green-bg:  #052e16;
  --green-bd:  #166534;
  --red:       #ef4444;
  --red-bg:    #2d0a0a;
  --red-bd:    #7f1d1d;
  --yellow:    #f59e0b;
  --yellow-bg: #2d1a00;
  --blue:      #60a5fa;
  --blue-bg:   #0d1f40;
  --purple:    #a78bfa;
  --mono:      'JetBrains Mono','Fira Mono','Consolas',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;padding:18px}
h1{font-size:15px;font-weight:600;margin-bottom:12px;letter-spacing:.4px}
.cfgbar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px;
  background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.cfggroup{display:flex;flex-direction:column;gap:3px}
.cfglabel{font-size:10px;color:var(--text3)}
.cfgbar input{background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  border-radius:4px;padding:3px 6px;font-family:var(--mono);font-size:12px;width:72px}
.cfgbar input[type="checkbox"]{width:auto;accent-color:var(--blue);margin-right:4px}
.checkrow{display:flex;align-items:center;gap:3px;color:var(--text2);font-size:10px;min-height:21px}
.tgroup{display:flex;flex-direction:column;gap:3px}
.trow{display:flex;gap:2px}
.tbtn{background:var(--bg3);border:1px solid var(--border2);color:var(--text3);
  border-radius:4px;padding:3px 9px;cursor:pointer;font-family:var(--mono);font-size:10px;transition:all .12s}
.tbtn:hover{color:var(--text2)}
.tbtn.act-off{background:#1a0a0a;border-color:#7f1d1d;color:var(--red)}
.tbtn.act-on {background:#052e16;border-color:#166534;color:var(--green)}
.tbtn.act-ext{background:var(--blue-bg);border-color:#1e40af;color:var(--blue)}
.mbar{display:grid;grid-template-columns:repeat(auto-fit,minmax(105px,1fr));gap:5px;margin-bottom:10px}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:6px 10px}
.ml{font-size:10px;color:var(--text3);margin-bottom:2px}
.mv{font-size:12px;font-weight:600}
.wrap{display:flex;gap:14px;align-items:flex-start}
.ldr{flex:0 0 295px}
.lhint{font-size:10px;color:var(--text3);margin-bottom:6px}
.lrow{display:flex;align-items:center;gap:4px;margin-bottom:3px}
.lp{color:var(--text3);width:64px;text-align:right;font-size:11px;flex-shrink:0}
.ob{flex:1;display:flex;justify-content:space-between;align-items:center;
  padding:3px 8px;border-radius:4px;cursor:pointer;font-family:var(--mono);
  font-size:10px;transition:filter .12s;color:var(--text)}
.ob:hover{filter:brightness(1.18)}
.ob:active{transform:scale(.97)}
.oe{flex:1;height:22px;border-bottom:1px dotted var(--border2)}
.logbox{background:var(--bg2);border:1px solid var(--border);border-radius:6px;
  padding:10px;height:500px;overflow-y:auto;line-height:1.65}
.ll{font-size:10px;color:var(--text2);white-space:pre-wrap;word-break:break-all}
.ll.fill{color:var(--text);font-weight:600;border-top:1px solid var(--border);margin-top:5px;padding-top:5px}
.ll.ok  {color:var(--green)}
.ll.warn{color:var(--yellow)}
.ll.err {color:var(--red)}
.ll.info{color:var(--blue)}
.btns{display:flex;gap:6px;margin-top:8px}
button.act{background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  border-radius:5px;padding:5px 10px;cursor:pointer;font-family:var(--mono);font-size:11px;transition:background .12s}
button.act:hover{background:var(--border)}
.sclabel{font-size:10px;color:var(--text3);margin-top:8px;background:var(--bg2);
  border:1px solid var(--border);border-radius:6px;padding:8px;line-height:1.7}
.sclabel b{color:var(--text2)}
.pnlrows{font-size:10px;color:var(--text2);line-height:1.55;margin-top:6px}
.pnlrows .gain{color:var(--green)}
.pnlrows .loss{color:var(--red)}
.badge{font-size:8px;padding:1px 3px;border-radius:2px;margin-left:2px}
.b-ext  {background:var(--blue-bg); color:var(--blue)}
.b-floor{background:var(--yellow-bg);color:var(--yellow)}
.b-top  {background:var(--blue-bg); color:var(--blue)}
.b-tu   {background:#2e1065;color:var(--purple)}
</style>
</head>
<body>
<h1>Grid Trading · Simulator v7 <span style="font-size:10px;color:var(--text3)">— trailing off / on / extended · auto balance + PnL</span></h1>

<div class="cfgbar">
  <div class="cfggroup">
    <span class="cfglabel">Saldo bot</span>
    <input id="cfg_balance" value="100" oninput="syncAutoLines()" style="width:82px">
  </div>
  <div class="cfggroup">
    <span class="cfglabel">Auto líneas</span>
    <label class="checkrow"><input id="cfg_auto_lines" type="checkbox" checked onchange="syncAutoLines()">por saldo</label>
  </div>
  <div class="cfggroup">
    <span class="cfglabel">Precio centro</span>
    <input id="cfg_price" value="1000" oninput="syncAutoLines()">
  </div>
  <div class="cfggroup">
    <span class="cfglabel">Step</span>
    <input id="cfg_step" value="20" style="width:56px" oninput="syncAutoLines()">
  </div>
  <div class="cfggroup">
    <span class="cfglabel">Líneas/lado</span>
    <input id="cfg_lines" value="5" style="width:48px">
  </div>
  <div class="cfggroup">
    <span class="cfglabel">Size</span>
    <input id="cfg_size" value="0.01" style="width:64px" oninput="syncAutoLines()">
  </div>
  <div class="tgroup">
    <span class="cfglabel">Trailing UP</span>
    <div class="trow">
      <button class="tbtn" data-dir="up" data-val="off"      onclick="setTrailing('up','off')">OFF</button>
      <button class="tbtn" data-dir="up" data-val="on"       onclick="setTrailing('up','on')">ON</button>
      <button class="tbtn" data-dir="up" data-val="extended" onclick="setTrailing('up','extended')">EXT</button>
      <button class="tbtn" data-dir="up" data-val="fixed_quote" onclick="setTrailing('up','fixed_quote')">QUOTE</button>
    </div>
  </div>
  <div class="tgroup">
    <span class="cfglabel">Trailing DOWN</span>
    <div class="trow">
      <button class="tbtn" data-dir="dn" data-val="off"      onclick="setTrailing('dn','off')">OFF</button>
      <button class="tbtn" data-dir="dn" data-val="on"       onclick="setTrailing('dn','on')">ON</button>
      <button class="tbtn" data-dir="dn" data-val="extended" onclick="setTrailing('dn','extended')">EXT</button>
    </div>
  </div>
  <div class="cfggroup" style="justify-content:flex-end">
    <button class="act" onclick="applyConfig()">Aplicar / Reset</button>
  </div>
</div>

<div id="mbar" class="mbar"></div>

<div class="wrap">
  <div class="ldr">
    <div class="lhint">Click en orden para fill &nbsp;|&nbsp; borde amarillo = siguiente sugerido</div>
    <div id="ldr"></div>
    <div class="btns">
      <button class="act" onclick="next()" style="flex:1">Siguiente ↗</button>
      <button class="act" onclick="undo()">Undo</button>
      <button class="act" onclick="applyConfig()">Reset</button>
    </div>
    <div class="sclabel" id="sclabel">—</div>
    <div class="sclabel" id="pnlbox">—</div>
  </div>
  <div style="flex:1"><div class="logbox" id="logbox"></div></div>
</div>

<script>
// ── globals ──────────────────────────────────────────────────────────────────
let history=[], S;
let CFG_UP="extended", CFG_DN="extended";

// ── tiny helpers ─────────────────────────────────────────────────────────────
const r2  = n => parseFloat(n.toFixed(2));
const r5  = n => parseFloat(n.toFixed(5));
const pk  = p => parseFloat(r2(p).toFixed(2)).toFixed(2);
const eq  = (a,b) => Math.abs(a-b)<0.005;
const lg  = (s,c,t) => s.log.push({c,t});
const money = n => (Number.isFinite(n)?n:0).toFixed(2);
const pct   = n => (Number.isFinite(n)?n:0).toFixed(2);

function principalLevels(s){ return s.levels.filter(l=>!s.ext[pk(l)]); }
function extSize(s){ return r5(s.base_size*0.5); }
function isRealOrder(o){ return o && !["virtual"].includes(o.oid); }
function orderReservedValue(o,mark){
  if(!isRealOrder(o))return 0;
  return o.side==="buy" ? o.price*o.size : mark*o.size;
}
function equityAt(s,mark=null){
  const m=mark??s.mark_price??s.center_price??0;
  let total=(s.usdc||0)+((s.btc||0)*m);
  Object.values(s.orders||{}).forEach(o=>{ total+=orderReservedValue(o,m); });
  return r2(total);
}
function pnlStats(s){
  const eqv=equityAt(s);
  const initial=s.initial_equity||0;
  const pnl=r2(eqv-initial);
  const p=initial>0?(pnl/initial)*100:0;
  return {equity:eqv,pnl,pct:p,realized:r2(s.realized_pnl||0)};
}
function addLot(s,size,cost){
  if(!Array.isArray(s.lots))s.lots=[];
  if(size<=0)return;
  s.lots.push({size:r5(size),cost:r2(cost)});
}
function consumeLotsForSell(s,size,sellPrice){
  if(!Array.isArray(s.lots))s.lots=[];
  let remaining=size, realized=0;
  const next=[];
  for(const lot of s.lots){
    if(remaining<=1e-9){ next.push(lot); continue; }
    const take=Math.min(lot.size,remaining);
    realized+=(sellPrice-lot.cost)*take;
    const left=r5(lot.size-take);
    if(left>1e-9)next.push({size:left,cost:lot.cost});
    remaining=r5(remaining-take);
  }
  if(remaining>1e-9){
    // Fallback defensivo para estados manuales inconsistentes: coste inicial.
    realized+=(sellPrice-(s.center_price||sellPrice))*remaining;
  }
  s.lots=next;
  s.realized_pnl=r2((s.realized_pnl||0)+realized);
  return r2(realized);
}
function requiredForLines(price,step,size,lines){
  let buyQuote=0;
  for(let i=1;i<=lines;i++){
    const lvl=price-(i*step);
    if(lvl<=0)return {buyQuote:Infinity,sellBase:Infinity,sellValue:Infinity,total:Infinity};
    buyQuote+=lvl*size;
  }
  const sellBase=size*lines;
  const sellValue=sellBase*price;
  return {buyQuote:r2(buyQuote),sellBase:r5(sellBase),sellValue:r2(sellValue),total:r2(buyQuote+sellValue)};
}
function maxLinesForBalance(price,step,size,balance){
  if(price<=0||step<=0||size<=0||balance<=0)return 0;
  let lines=0;
  for(let n=1;n<=500;n++){
    const req=requiredForLines(price,step,size,n);
    if(!Number.isFinite(req.total)||req.total>balance+1e-9)break;
    lines=n;
  }
  return lines;
}
function syncAutoLines(){
  const auto=document.getElementById("cfg_auto_lines");
  const linesEl=document.getElementById("cfg_lines");
  if(!auto||!linesEl)return;
  linesEl.disabled=!!auto.checked;
  linesEl.style.opacity=auto.checked?"0.65":"1";
  if(!auto.checked)return;
  const price=parseFloat(document.getElementById("cfg_price").value)||0;
  const step =parseFloat(document.getElementById("cfg_step").value)||0;
  const size =parseFloat(document.getElementById("cfg_size").value)||0;
  const balance=parseFloat(document.getElementById("cfg_balance").value)||0;
  linesEl.value=maxLinesForBalance(price,step,size,balance);
}
function recordPnl(s){
  const st=pnlStats(s);
  if(!Array.isArray(s.pnl_history))s.pnl_history=[];
  s.pnl_history.push({n:s.fc,price:s.mark_price,equity:st.equity,pnl:st.pnl,pct:st.pct,realized:st.realized});
  const cls=st.pnl>=0?"+":"";
  lg(s,st.pnl>=0?"ok":"err",`  PNL #${s.fc}: equity=${money(st.equity)} pnl=${cls}${money(st.pnl)} (${cls}${pct(st.pct)}%) realized=${st.realized>=0?"+":""}${money(st.realized)} mark=${pk(s.mark_price)}`);
}

// engine: trailing_up_min_factor=0.50, reduction_per_level=0.025
function tuFactor(n){ return Math.max(0.50, 1-0.025*n); }
function tuSize(s,n){ return r5(s.base_size*tuFactor(n)); }
function tuStepFrom(o){ return (o.trailing_up_step!=null&&o.trailing_up_step>0)?o.trailing_up_step:0; }
function currentFixedQuoteAnchor(s){
  const levels=[...new Set(s.levels)].sort((a,b)=>a-b);
  if(!levels.length)return r2(s.center_price??s.anchor_high);
  const mid=Math.floor(levels.length/2);
  if(levels.length%2===1)return r2(levels[mid]);
  return r2((levels[mid-1]+levels[mid])/2);
}
function tuFixedQuote(s){ return r2((s.fixed_anchor??currentFixedQuoteAnchor(s))*s.base_size); }
function tuFixedQuoteSize(s,price){ return r5(Math.min(s.base_size, tuFixedQuote(s)/price)); }

// ── state factory ─────────────────────────────────────────────────────────────
function mkS(cfg={}){
  const price=cfg.price??1000, step=cfg.step??20, lines=cfg.lines??5, size=cfg.size??0.01;
  const balance=cfg.balance??100;
  const req=requiredForLines(price,step,size,lines);
  const freeUsdc=r2(balance-req.total);
  const levels=[]; for(let i=-lines;i<=lines;i++) levels.push(r2(price+i*step));
  const orders={};
  levels.forEach(lvl=>{
    const k=pk(lvl);
    if(lvl<price) orders[k]={side:"buy", oid:`r${k}`,price:lvl,size,extended:false,gs:null,ps:null,trailing_up_step:null};
    if(lvl>price) orders[k]={side:"sell",oid:`r${k}`,price:lvl,size,extended:false,gs:null,ps:null,trailing_up_step:null};
  });
  const s={
    center_price:price,mark_price:price,levels_below:lines,levels_above:lines,
    base_step:step,base_size:size,max_levels:(lines*2)+2,
    bot_balance:balance,initial_equity:balance,initial_required:req,
    trailing_up:CFG_UP,trailing_down:CFG_DN,
    drops:0,up_steps:0,fc:0,si:0,
    levels,ext:Object.create(null),orders,
    anchor_high:r2(price+lines*step),
    fixed_anchor:CFG_UP==="fixed_quote"?price:null,
    usdc:freeUsdc,btc:0.00,realized_pnl:0,lots:req.sellBase>0?[{size:req.sellBase,cost:price}]:[],pnl_history:[],
    log:[
      {c:"fill",t:`INIT | balance=${money(balance)} price=${price} step=${step} size=${size} lines=${lines}`},
      {c:"",    t:`capital inicial: BUY reservado=${money(req.buyQuote)} | BTC SELL reservado=${req.sellBase.toFixed(5)} (${money(req.sellValue)}) | USDC libre=${money(freeUsdc)}`},
      {c:"",    t:`trailing_up=${CFG_UP}  trailing_down=${CFG_DN}`},
      {c:"",    t:" "},
    ],
  };
  if(freeUsdc<0)lg(s,"warn",`  ! Saldo insuficiente para ${lines} líneas/lado: faltan ${money(Math.abs(freeUsdc))} USDC-equivalentes`);
  return s;
}
function cp(s){ return{...s,levels:[...s.levels],ext:{...s.ext},
  orders:JSON.parse(JSON.stringify(s.orders)),log:[...s.log],
  lots:Array.isArray(s.lots)?JSON.parse(JSON.stringify(s.lots)):[],
  pnl_history:Array.isArray(s.pnl_history)?JSON.parse(JSON.stringify(s.pnl_history)):[]}; }

// ── UI actions ────────────────────────────────────────────────────────────────
function setTrailing(dir,val){
  const prevUp=CFG_UP, prevDn=CFG_DN;
  if(dir==="up") CFG_UP=val; else CFG_DN=val;
  if(S){
    S.trailing_up=CFG_UP; S.trailing_down=CFG_DN;

    if(CFG_UP!=="extended")S.up_steps=0;
    if(CFG_DN!=="extended")S.drops=0;

    if(CFG_UP==="fixed_quote"){
      const currentAnchor=currentFixedQuoteAnchor(S);
      const storedAnchor=S.fixed_anchor??currentAnchor;
      const relock=prevUp!=="fixed_quote" || S.fixed_anchor==null || !eq(storedAnchor,currentAnchor);
      if(relock)S.fixed_anchor=currentAnchor;
      lg(S,"info",`  ⚙ trailing_up=fixed_quote anchor=${pk(S.fixed_anchor)} quote=${tuFixedQuote(S).toFixed(2)}`);
    }else{
      S.fixed_anchor=null;
      if(dir==="up")lg(S,"info",`  ⚙ trailing_up=${CFG_UP} (cambio en caliente — mirrors engine.set_trailing)`);
    }

    const removed=[];
    Object.entries({...S.orders}).forEach(([k,o])=>{
      if(o.oid!=="virtual")return;
      if(CFG_UP==="off"&&o.side==="sell"){
        delete S.orders[k]; delete S.ext[k];
        S.levels=S.levels.filter(l=>!eq(l,parseFloat(k)));
        removed.push(`SELL ${k}`);
      }else if(CFG_DN==="off"&&o.side==="buy"){
        delete S.orders[k]; delete S.ext[k];
        S.levels=S.levels.filter(l=>!eq(l,parseFloat(k)));
        removed.push(`BUY ${k}`);
      }
    });
    if(dir==="dn")lg(S,"info",`  ⚙ trailing_down=${CFG_DN} (cambio en caliente — mirrors engine.set_trailing)`);
    if(removed.length)lg(S,"warn",`  ~ virtuales eliminadas por trailing OFF: ${removed.sort().join(", ")}`);
    if(prevUp!==CFG_UP||prevDn!==CFG_DN)S.levels=[...new Set(S.levels)].sort((a,b)=>a-b);
  }
  renderButtons(); if(S) render();
}

function renderButtons(){
  ["up","dn"].forEach(dir=>{
    const val=dir==="up"?CFG_UP:CFG_DN;
    document.querySelectorAll(`[data-dir="${dir}"]`).forEach(b=>{
      const cls = val==="extended"||val==="fixed_quote" ? "ext" : val;
      b.className="tbtn"+(b.dataset.val===val?` act-${cls}`:"");
    });
  });
}

function applyConfig(){
  syncAutoLines();
  const price=parseFloat(document.getElementById("cfg_price").value);
  const step =parseFloat(document.getElementById("cfg_step").value);
  const lines=parseInt(document.getElementById("cfg_lines").value);
  const size =parseFloat(document.getElementById("cfg_size").value);
  const balance=parseFloat(document.getElementById("cfg_balance").value);
  history=[];
  S=mkS({price,step,lines,size,balance});
  render();
}

// ── order helpers ─────────────────────────────────────────────────────────────
function pruneFloorVirtualBuys(s,keepKey=null){
  const vb=Object.entries(s.orders)
    .filter(([,o])=>o.side==="buy"&&o.oid==="virtual")
    .sort(([a],[b])=>parseFloat(a)-parseFloat(b));
  if(!vb.length)return [];
  if(keepKey==null)keepKey=vb[vb.length-1][0];
  const removed=[];
  vb.forEach(([k])=>{
    if(k===keepKey)return;
    delete s.orders[k]; delete s.ext[k];
    s.levels=s.levels.filter(l=>!eq(l,parseFloat(k)));
    removed.push(k);
  });
  return removed.sort((a,b)=>parseFloat(a)-parseFloat(b));
}
function pruneCeilingVirtualSells(s,keepKey=null){
  const vs=Object.entries(s.orders)
    .filter(([,o])=>o.side==="sell"&&o.oid==="virtual")
    .sort(([a],[b])=>parseFloat(a)-parseFloat(b));
  if(!vs.length)return [];
  if(keepKey==null)keepKey=vs[0][0];
  const removed=[];
  vs.forEach(([k])=>{
    if(k===keepKey)return;
    delete s.orders[k]; delete s.ext[k];
    s.levels=s.levels.filter(l=>!eq(l,parseFloat(k)));
    removed.push(k);
  });
  return removed.sort((a,b)=>parseFloat(b)-parseFloat(a));
}
function replaceFloorVirtualAfterCancel(s,canceledPrice,size,meta={}){
  const k=pk(canceledPrice);
  const cur=s.orders[k];
  if(cur&&cur.oid!=="virtual")return [];
  s.orders[k]={
    side:"buy",oid:"virtual",price:r2(canceledPrice),size,
    extended:!!meta.extended,gs:meta.gs??null,ps:meta.ps??null,
    trailing_up_step:meta.trailing_up_step??null
  };
  if(!s.levels.find(l=>eq(l,canceledPrice)))s.levels.push(r2(canceledPrice));
  const removed=pruneFloorVirtualBuys(s,k);
  lg(s,"info",`  v BUY suelo movida a ${k} tras cancelar BUY`);
  if(removed.length)lg(s,"warn",`  ~ vBUY antiguas eliminadas: ${removed.join(", ")}`);
  return removed;
}
function replaceCeilingVirtualAfterCancel(s,canceledPrice,size,meta={}){
  const k=pk(canceledPrice);
  const cur=s.orders[k];
  if(cur&&cur.oid!=="virtual")return [];
  s.orders[k]={
    side:"sell",oid:"virtual",price:r2(canceledPrice),size,
    extended:false,gs:null,ps:null,
    trailing_up_step:meta.trailing_up_step??null
  };
  delete s.ext[k];
  if(!s.levels.find(l=>eq(l,canceledPrice)))s.levels.push(r2(canceledPrice));
  const removed=pruneCeilingVirtualSells(s,k);
  lg(s,"info",`  v SELL techo movida a ${k} tras cancelar SELL`);
  if(removed.length)lg(s,"warn",`  ~ vSELL antiguas eliminadas: ${removed.join(", ")}`);
  return removed;
}
function markExt(s,price,gs){
  const k=pk(price); s.ext[k]=gs;
  if(!s.levels.find(l=>eq(l,price))) s.levels.push(price);
}

// mirrors _release_btc_for_trailing_down_sell
function releaseBtc(s,tkey,req){
  let est=s.btc,n=0;
  if(est>=req-1e-6)return true;
  while(est<req-1e-6){
    const c=Object.entries(s.orders)
      .filter(([,o])=>o.side==="sell"&&
        !["virtual","pending_post_only","pending_manual","pending_cancel","pending_replace"].includes(o.oid))
      .sort(([a],[b])=>parseFloat(b)-parseFloat(a));
    if(!c.length){
      if(s.btc>est)est=s.btc;
      if(est>=req-1e-6)return true;
      lg(s,"warn",`  ! Sin SELL para liberar BTC (${est.toFixed(5)}<${req.toFixed(5)})`);
      return false;
    }
    const[ck,co]=c[0]; est+=co.size; n++;
    s.btc=r5(s.btc+co.size); delete s.orders[ck]; delete s.ext[ck];
    s.levels=s.levels.filter(l=>!eq(l,parseFloat(ck)));
    lg(s,"err",`  x CANCEL SELL@${ck} sz=${co.size.toFixed(5)} +BTC est=${est.toFixed(5)}`);
    if(ck!==tkey)replaceCeilingVirtualAfterCancel(s,parseFloat(ck),co.size,{trailing_up_step:tuStepFrom(co)||null});
    if(est>=req-1e-6){lg(s,"info",`  ✓ BTC liberado (${n} cancel)`);return true;}
  }
  return true;
}

// mirrors _release_usdc_for_trailing_up_buy
function releaseUsdc(s,bp,bsz){
  const req=r2(bsz*bp);
  let est=s.usdc,n=0;
  if(est>=req-1e-4)return true;
  const excl=new Set([pk(bp)]);
  while(est<req-1e-4){
    const c=Object.entries(s.orders)
      .filter(([k,o])=>o.side==="buy"&&
        !["virtual","pending_post_only","pending_manual","pending_cancel","pending_replace"].includes(o.oid)&&
        !excl.has(k))
      .sort(([a],[b])=>parseFloat(a)-parseFloat(b));
    if(!c.length){
      if(s.usdc>est)est=s.usdc;
      if(est>=req-1e-4)return true;
      lg(s,"warn",`  ! Sin BUY para liberar USDC (${est.toFixed(4)}<${req.toFixed(4)})`);
      return false;
    }
    const[ck,co]=c[0];
    const rel=r2(co.size*co.price);
    s.usdc=r2(s.usdc+rel); est+=rel; n++;
    delete s.orders[ck]; delete s.ext[ck];
    s.levels=s.levels.filter(l=>!eq(l,parseFloat(ck)));
    lg(s,"err",`  x CANCEL BUY@${ck} +${rel.toFixed(4)} USDC est=${est.toFixed(4)}`);
    replaceFloorVirtualAfterCancel(s,parseFloat(ck),co.size,{extended:co.extended,gs:co.gs,ps:co.ps,trailing_up_step:tuStepFrom(co)||null});
    excl.add(ck);
    if(est>=req-1e-4){lg(s,"info",`  ✓ USDC liberado (${n} cancel)`);return true;}
  }
  return true;
}

function placeOrd(s,price,side,size,extended=false,gs=null,ps=null,tu=null){
  const k=pk(price);
  if(s.orders[k]){lg(s,"warn",`  ! SKIP ${side.toUpperCase()}@${k} ocupado`);return false;}
  if(side==="buy"){
    const cost=r2(size*price);
    if(s.usdc<cost-1e-4){lg(s,"warn",`  ! SKIP BUY@${k} usdc=${s.usdc.toFixed(4)} req=${cost.toFixed(4)}`);return false;}
    s.usdc=r2(s.usdc-cost);
  }else{
    if(s.btc<size-1e-6){lg(s,"warn",`  ! SKIP SELL@${k} btc=${s.btc.toFixed(5)} req=${size.toFixed(5)}`);return false;}
    s.btc=r5(s.btc-size);
  }
  s.orders[k]={side,oid:`${side[0]}_${k}`,price,size,extended,gs,ps,trailing_up_step:tu};
  if(!s.levels.find(l=>eq(l,price)))s.levels.push(price);
  const etag=extended?` [EXT gs=${gs!=null?r2(gs):"?"}]`:"";
  lg(s,"ok",`  + ${side.toUpperCase()}@${k} sz=${size.toFixed(5)}${etag} | usdc=${s.usdc.toFixed(4)} btc=${s.btc.toFixed(5)}`);
  return true;
}

function addVirt(s,price,side,size,extended=false,gs=null,ps=null,tu=null){
  const k=pk(price);
  if(s.orders[k])return;
  s.orders[k]={side,oid:"virtual",price,size,extended,gs,ps,trailing_up_step:tu};
  if(!s.levels.find(l=>eq(l,price)))s.levels.push(price);
  const etag=extended?` [EXT gs=${gs!=null?r2(gs):"?"}]`:"";
  lg(s,"info",`  v ${side.toUpperCase()}@${k} (virtual)${etag} sz=${size.toFixed(5)}`);
}

// ── main fill (mirrors GridEngine.rebalance_after_fill) ───────────────────────
function fill(key){
  const o=S.orders[key]; if(!o)return;
  history.push(JSON.stringify(S));
  const s=cp(S); s.fc++;
  const isV  =o.oid==="virtual";
  const isExt=o.extended||(key in s.ext);
  const bs   =s.base_step;
  const td   =s.trailing_down;
  const tu   =s.trailing_up;
  s.mark_price=o.price;

  lg(s,"fill",`── FILL #${s.fc}: ${o.side.toUpperCase()}@${key} [${isV?"V":"R"}]${isExt?"[EXT]":""} sz=${o.size.toFixed(5)}  tu=${tu} td=${td}`);
  if(!isV){
    if(o.side==="buy"){
      s.btc=r5(s.btc+o.size);
      addLot(s,o.size,o.price);
      lg(s,"ok",`  BTC  +${o.size.toFixed(5)} → ${s.btc.toFixed(5)} | lot cost=${pk(o.price)}`);
    }
    else{
      const u=r2(o.price*o.size);
      const rp=consumeLotsForSell(s,o.size,o.price);
      s.usdc=r2(s.usdc+u);
      lg(s,"ok",`  USDC +${u.toFixed(4)} → ${s.usdc.toFixed(4)} | realized ${rp>=0?"+":""}${money(rp)}`);
    }
  }else{lg(s,"info","  Virtual activado (sin trade real)");}

  // counter updates (ALL non-extended fills, before dispatch)
  if(!isExt){
    if(o.side==="buy"){
      const fs=tuStepFrom(o),prev=s.up_steps;
      s.up_steps=Math.max(0,fs-1);
      if(prev!==s.up_steps)lg(s,"info",`  ↓ up_steps ${prev}→${s.up_steps}`);
    }else{
      const fs=tuStepFrom(o);
      if(fs>0){const prev=s.up_steps;s.up_steps=fs;if(prev!==fs)lg(s,"info",`  ↑ up_steps ${prev}→${fs}`);}
    }
  }

  delete s.orders[key];
  let handled=false;

  // ── SELL extended ────────────────────────────────────────────────────────
  if(o.side==="sell"&&isExt){
    const gs=o.gs??s.ext[key]??bs;
    const bp=r2(o.price-gs);
    markExt(s,bp,gs);
    placeOrd(s,bp,"buy",o.size,true,gs,o.price);
    lg(s,"fill",`  EXT SELL→BUY@${pk(bp)} gs=${r2(gs)}`);
    handled=true;
  }

  // ── BUY extended ─────────────────────────────────────────────────────────
  else if(o.side==="buy"&&isExt){
    const gs=o.gs??s.ext[key]??bs;
    const sp=o.ps!=null?r2(o.ps):r2(o.price+gs);
    markExt(s,o.price,gs);
    lg(s,"fill",`  EXT BUY: gs=${r2(gs)} SELL@${pk(sp)}`);

    if(isV){
      if(td==="extended"){
        const nbp=r2(o.price-gs);
        s.drops++; markExt(s,nbp,gs);
        lg(s,"fill",`  drop#${s.drops} step ${r2(gs)} next@${pk(nbp)}`);
        const es=extSize(s);
        if(!releaseBtc(s,pk(sp),es))lg(s,"warn",`  ! SELL@${pk(sp)} omitido: BTC`);
        else placeOrd(s,sp,"sell",es,true,gs,o.price);
        addVirt(s,nbp,"buy",es,true,gs,o.price);
      }else if(td==="on"){
        const nbp=r2(o.price-gs); markExt(s,nbp,gs);
        if(!releaseBtc(s,pk(sp),o.size))lg(s,"warn",`  ! SELL@${pk(sp)} omitido: BTC`);
        else placeOrd(s,sp,"sell",o.size,true,gs,o.price);
        addVirt(s,nbp,"buy",o.size,true,gs,o.price);
        lg(s,"fill",`  td=on: SELL@${pk(sp)} + vBUY@${pk(nbp)} (mismo step)`);
      }else{
        lg(s,"fill",`  td=off: virtual BUY extended activada, no se extiende`);
      }
    }else{
      placeOrd(s,sp,"sell",o.size,true,gs,o.price);
    }
    handled=true;
  }

  // ── BUY en suelo principal → iniciar trailing down ───────────────────────
  if(!handled&&o.side==="buy"){
    const pl=principalLevels(s);
    const lo=pl.length?Math.min(...pl):Math.min(...s.levels);
    const isRecordedFloorBuy=eq(o.price,lo);
    const isVirtualFloorBuy=isV&&td!=="off";
    if(isRecordedFloorBuy||isVirtualFloorBuy){
      if(isV&&!isRecordedFloorBuy)lg(s,"fill",`  BUY virtual ${key} tratada como suelo operativo aunque suelo registrado=${pk(lo)}`);
      const sp=r2(o.price+bs),bp=r2(o.price-bs);
      if(td==="extended"){
        markExt(s,bp,bs);
        if(isV&&!releaseBtc(s,pk(sp),o.size))lg(s,"warn",`  ! SELL@${pk(sp)} omitido: BTC`);
        else placeOrd(s,sp,"sell",o.size,false);
        addVirt(s,bp,"buy",extSize(s),true,bs,o.price);
        lg(s,"fill",`  td=ext iniciado: SELL@${pk(sp)} sz=${o.size.toFixed(5)} + vBUY@${pk(bp)} gs=${bs}`);
      }else if(td==="on"){
        s.levels.push(bp);
        const all=[...new Set(s.levels)].sort((a,b)=>a-b);
        if(all.length>(s.max_levels??all.length)){
          const h=Math.max(...all);
          const hk=pk(h);
          const rm=s.orders[hk];
          const shouldMoveCeiling=rm&&!["virtual","pending_post_only","pending_manual","pending_cancel","pending_replace"].includes(rm.oid);
          if(shouldMoveCeiling){
            s.btc=r5(s.btc+rm.size);
            lg(s,"err",`  x CANCEL SELL@${hk} (max_levels) +${rm.size.toFixed(5)} BTC`);
          }
          delete s.orders[hk]; delete s.ext[hk];
          s.levels=s.levels.filter(l=>!eq(l,h));
          if(shouldMoveCeiling)replaceCeilingVirtualAfterCancel(s,h,rm.size,{trailing_up_step:tuStepFrom(rm)||null});
        }
        if(isV&&!releaseBtc(s,pk(sp),o.size))lg(s,"warn",`  ! SELL@${pk(sp)} omitido: BTC`);
        else placeOrd(s,sp,"sell",o.size,false);
        addVirt(s,bp,"buy",o.size,false);
        lg(s,"fill",`  td=on: SELL@${pk(sp)} + vBUY@${pk(bp)}`);
      }else{
        if(isV&&!releaseBtc(s,pk(sp),o.size))lg(s,"warn",`  ! SELL@${pk(sp)} omitido: BTC`);
        else placeOrd(s,sp,"sell",o.size,false);
        lg(s,"fill",`  td=off: SELL@${pk(sp)} sin extensión`);
      }
      handled=true;
    }
  }

  // ── SELL en techo → trailing up ──────────────────────────────────────────
  if(!handled&&o.side==="sell"){
    const hi=Math.max(...s.levels);
    if(eq(o.price,hi)){
      const cur=tuStepFrom(o);
      const bp=r2(o.price-bs),tp=r2(o.price+bs),tpk=pk(tp);

      if(tu==="extended"){
        const bsz=o.size;
        let placed=false;
        if(!isV){
          placed=placeOrd(s,bp,"buy",bsz,false,null,null,cur||null);
        }else{
          if(!releaseUsdc(s,bp,bsz))lg(s,"warn",`  ! BUY@${pk(bp)} omitido: USDC`);
          else placed=placeOrd(s,bp,"buy",bsz,false,null,null,cur||null);
        }
        if(!s.orders[tpk]){
          const ns=cur+1; s.up_steps=ns;
          const vsz=tuSize(s,ns);
          addVirt(s,tp,"sell",vsz,false,null,null,ns);
          lg(s,"fill",`  tu=ext: vSELL@${tpk} sz=${vsz.toFixed(5)} factor=${tuFactor(ns).toFixed(3)} step=${ns}`);
        }else{lg(s,"info",`  tu=ext: vSELL@${tpk} ya existe`);}
        lg(s,"fill",`  tu=ext: BUY@${pk(bp)} sz=${bsz.toFixed(5)} placed=${placed} step=${cur}`);

      }else if(tu==="fixed_quote"){
        const bsz=o.size;
        let placed=false;
        if(!isV){placed=placeOrd(s,bp,"buy",bsz,false);}
        else{
          if(!releaseUsdc(s,bp,bsz))lg(s,"warn",`  ! BUY@${pk(bp)} omitido: USDC`);
          else placed=placeOrd(s,bp,"buy",bsz,false);
        }
        if(!s.orders[tpk]){
          s.up_steps=0;
          const vsz=tuFixedQuoteSize(s,tp);
          addVirt(s,tp,"sell",vsz,false);
          lg(s,"fill",`  tu=quote: vSELL@${tpk} sz=${vsz.toFixed(5)} quote=${tuFixedQuote(s).toFixed(2)}`);
        }else{lg(s,"info",`  tu=quote: vSELL@${tpk} ya existe`);}
        lg(s,"fill",`  tu=quote: BUY@${pk(bp)} sz=${bsz.toFixed(5)} placed=${placed}`);

      }else if(tu==="on"){
        let placed=false;
        if(!isV){placed=placeOrd(s,bp,"buy",o.size,false);}
        else{
          if(!releaseUsdc(s,bp,o.size))lg(s,"warn",`  ! BUY@${pk(bp)} omitido: USDC`);
          else placed=placeOrd(s,bp,"buy",o.size,false);
        }
        if(!s.orders[tpk]){
          s.up_steps=0;
          addVirt(s,tp,"sell",o.size,false);
          lg(s,"fill",`  tu=on: vSELL@${tpk} sz=${o.size.toFixed(5)} (full)`);
        }else{lg(s,"info",`  tu=on: vSELL@${tpk} ya existe`);}
        lg(s,"fill",`  tu=on: BUY@${pk(bp)} placed=${placed}`);

      }else{
        if(isV&&!releaseUsdc(s,bp,o.size))lg(s,"warn",`  ! BUY@${pk(bp)} omitido: USDC`);
        else placeOrd(s,bp,"buy",o.size,false);
        lg(s,"fill",`  tu=off: BUY@${pk(bp)} sin extensión`);
      }
      handled=true;
    }
  }

  // ── BUY intermedio → SELL arriba ─────────────────────────────────────────
  if(!handled&&o.side==="buy"){
    const sp=r2(o.price+bs);
    if(isV&&!releaseBtc(s,pk(sp),o.size))lg(s,"warn",`  ! SELL@${pk(sp)} omitido: BTC`);
    else placeOrd(s,sp,"sell",o.size,false,null,null,o.trailing_up_step??null);
    lg(s,"","  BUY intermedio → SELL arriba"); handled=true;
  }

  // ── SELL intermedio → BUY abajo ──────────────────────────────────────────
  if(!handled&&o.side==="sell"){
    const nbp=r2(o.price-bs);
    const nsz=o.size;
    const tmeta=(tu==="extended")?(o.trailing_up_step??null):null;
    if(isV&&!releaseUsdc(s,nbp,nsz))lg(s,"warn",`  ! BUY@${pk(nbp)} omitido: USDC`);
    else placeOrd(s,nbp,"buy",nsz,false,null,null,tmeta);
    lg(s,"","  SELL intermedio → BUY abajo"); handled=true;
  }

  s.levels=[...new Set(s.levels)].sort((a,b)=>a-b);
  const ek=Object.keys(s.ext).sort((a,b)=>parseFloat(a)-parseFloat(b));
  lg(s,"",`  ▸ drops=${s.drops} up_steps=${s.up_steps} usdc=${s.usdc.toFixed(4)} btc=${s.btc.toFixed(5)}`);
  if(ek.length)lg(s,"",`    ext={${ek.map(k=>`${k}:${r2(s.ext[k])}`).join(", ")}}`);
  recordPnl(s);
  s.si=(s.si||0)+1;
  S=s; render();
}

// ── scenario hints (only for ext/ext) ────────────────────────────────────────
const STEPS=[
  ["Toca suelo principal → fill BUY más bajo",         "buy_principal"],
  ["1ª bajada virtual ext (drops→1)",                  "vbuy_ext"],
  ["2ª bajada virtual ext (drops→2)",                  "vbuy_ext"],
  ["3ª bajada virtual ext (drops→3)",                  "vbuy_ext"],
  ["Sube: fill SELL ext más bajo",                     "sell_ext_low"],
  ["Sube: fill SELL ext siguiente",                    "sell_ext_low"],
  ["Sube: fill SELL principal real → BUY directo",     "sell_principal_low"],
  ["Sube: fill vSELL techo → BUY con liberación USDC", "vsell_top"],
  ["Baja: fill vBUY ext (drops→4)",                    "vbuy_ext"],
  ["Baja: fill vBUY ext (drops→5)",                    "vbuy_ext"],
];

function getSuggestedKey(){
  if(S.trailing_up!=="extended"||S.trailing_down!=="extended")return null;
  const si=S.si||0; if(si>=STEPS.length)return null;
  const hint=STEPS[si][1],ords=S.orders;
  if(hint==="buy_principal"){const pl=principalLevels(S);const lp=pl.length?Math.min(...pl):null;return lp?pk(lp):null;}
  if(hint==="vbuy_ext"){const vb=Object.entries(ords).filter(([,o])=>o.side==="buy"&&o.oid==="virtual"&&o.extended).sort(([a],[b])=>parseFloat(a)-parseFloat(b));return vb.length?vb[0][0]:null;}
  if(hint==="sell_ext_low"){const es=Object.entries(ords).filter(([,o])=>o.side==="sell"&&o.extended&&o.oid!=="virtual").sort(([a],[b])=>parseFloat(a)-parseFloat(b));return es.length?es[0][0]:null;}
  if(hint==="sell_principal_low"){const ps=Object.entries(ords).filter(([,o])=>o.side==="sell"&&!o.extended&&o.oid!=="virtual").sort(([a],[b])=>parseFloat(a)-parseFloat(b));return ps.length?ps[0][0]:null;}
  if(hint==="vsell_top"){const h=Math.max(...S.levels);const k=pk(h);return(ords[k]&&ords[k].oid==="virtual"&&ords[k].side==="sell")?k:null;}
  return null;
}

function next(){const k=getSuggestedKey();if(k&&S.orders[k])fill(k);}
function undo(){if(!history.length)return;S=JSON.parse(history.pop());render();}

    (ph.length?`<div class="pnlrows">${ph.map(x=>`#${x.n} @${pk(x.price)} · eq=${money(x.equity)} · <span class="${x.pnl>=0?"gain":"loss"}">${x.pnl>=0?"+":""}${money(x.pnl)} (${x.pnl>=0?"+":""}${pct(x.pct)}%)</span> · real=${x.realized>=0?"+":""}${money(x.realized)}`).join("<br>")}</div>`:`<div class="pnlrows">Sin fills todavía.</div>`);

  const ls=[...new Set(S.levels)].sort((a,b)=>b-a);
  const lo=ls.length?ls[ls.length-1]:null,hi=ls.length?ls[0]:null;

    const bg=isBuy?"var(--green-bg)":"var(--red-bg)";
    const clr=isBuy?"var(--green)":"var(--red)";

}

  lines:parseInt(document.getElementById("cfg_lines").value)||0,
});
render();
</script>
